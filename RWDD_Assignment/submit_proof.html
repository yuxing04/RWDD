<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoStudent Dashboard</title>
    <link rel="stylesheet" href="student.css">
    <link rel="stylesheet" href="submit_proof.css">
<body>

    <aside class="sidebar">
        <div class="top-sidebar">
            <img src="image/logo.png" alt="EcoRiseAPU Logo"/>
            <img src="image/close.png" alt="Close Icon" onclick="toggleSidebarVisibility()" />
        </div>
        <ul class="nav-links">
            <li>
                <a href="student_dashboard.html"><img src="image/home.png" alt="home"> Dashboard</a>
            </li>

            <li>
                <a href="events.html"><img src="image/event.png" alt="calender"> Events</a>
            </li>

            <li>
                <a href="my_events.html"><img src="image/timetable.png" alt="timetable">  My Events</a>
            </li>

            <li class="active_nav">
                <a href="submit_proof.html"><img src="image/upload.png" alt="upload"> Submit Proof</a>
            </li>

            <li>
                <a href="contributions.html"><img src="image/leaf.png" alt="leaf"> Contributions</a>
            </li>

            <li>
                <a href="rewards.html"><img src="image/reward.png" alt="reward"> Rewards</a>
            </li>

            <li>
                <a href="leaderboard.html"><img src="image/leaderboard.png" alt="leaderboard"> Leaderboard</a>
            </li>

            <li>
                <a href="profile.html"><img src="image/user.png" alt="user"> Profile</a>
            </li>

        </ul>
        <div class="signout-container">
            <a href="#"><img src="image/sign out.png" alt="sign out" class="sign-out">Sign Out</a>
        </div>
    </aside>

    <div class="main-wrapper">
        <header class="top-header">
            <div class="user-profile">
                <div class="user-text">
                    <strong>Lebron James</strong>
                    <small>STUDENT</small>
                </div>
                <img src="image/user-icon.png" alt="user icon" class="user-icon">
            </div>
        </header>

    <div class="container">
        <h2>Submit Proof</h2><br>

        <form id="proofForm">
            <label>Title</label>
            <input type="text" id="purpose" placeholder="e.g. Tree Planting Event" required>

            <label>Description</label>
            <textarea id="description" rows="5" placeholder="Explain what this proof is about" required></textarea>
            
            <label>Proof Attachment (Photo)</label>
            <div class="upload-container">
                <input type="file" id="photo" accept="image/*" required>
                <label for="photo" class="upload-box">
                    <div class="icon-circle">
                        <img src="image/image.png" alt="icon" width="30">
                    </div>
                    <strong>Click to upload photo</strong>
                    <span>JPEG, PNG or GIF up to 10MB</span>
                </label>
            </div>

            <img id="preview" class="preview" alt="Image Preview">
            
            <button type="submit" id="submit">Submit Proof</button>
        </form>

    </div>

    
    <script src="script.js"></script>
    <script src="submit_proof.js"></script>
</body>
</html>
