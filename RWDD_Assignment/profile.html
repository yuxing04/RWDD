<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoStudent Dashboard</title>
    <link rel="stylesheet" href="student.css">
    <link rel="stylesheet" href="profile.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    
<body>
    <img src="image/close.png" alt="Close Icon" class="close-sidebar-btn" onclick="toggleSidebarVisibility()">
    <aside class="sidebar">
        <div class="top-sidebar">
            <img src="image/logo.png" alt="EcoRiseAPU Logo"/>
        </div>
        <ul class="nav-links">
            <li>
                <a href="student_dashboard.html"><img src="image/home.png" alt="home"> Dashboard</a>
            </li>

            <li>
                <a href="events.html"><img src="image/event.png" alt="calender"> Events</a>
            </li>

            <li>
                <a href="my_events.html"><img src="image/timetable.png" alt="timetable">  My Events</a>
            </li>

            <li>
                <a href="submit_proof.html"><img src="image/upload.png" alt="upload"> Submit Proof</a>
            </li>

            <li>
                <a href="contributions.html"><img src="image/leaf.png" alt="leaf"> Contributions</a>
            </li>

            <li>
                <a href="rewards.html"><img src="image/reward.png" alt="reward"> Rewards</a>
            </li>

            <li>
                <a href="leaderboard.html"><img src="image/leaderboard.png" alt="leaderboard"> Leaderboard</a>
            </li>

            <li class="active_nav">
                <a href="profile.html"><img src="image/user.png" alt="user"> Profile</a>
            </li>

        </ul>

        <div class="signout-container">
            <a href="#"><img src="image/sign out.png" alt="sign out" class="sign-out">Sign Out</a>
        </div>
    </aside>

    <div class="main-wrapper">
        <header class="top-header">
            <div class="hamburger-menu" onclick="toggleSidebarVisibility()">
                <img src="image/hamburger-menu.png" alt="Hamburger Menu">
            </div>
            <div class="logo-icon">
                <img src="image/logo-black.png" alt="EcoRiseAPU Logo">
            </div>
            <div class="user-profile">
                <div class="user-text">
                    <strong>Lebron James</strong>
                    <small>STUDENT</small>
                </div>
                <img src="image/user-icon.png" alt="user icon" class="user-icon">
            </div>
        </header>

        <main class="main-content">
            <header class="content-header">
                <h1>Profile Settings</h1>
                <p>Manage your account preferences and personal information</p>
            </header>
            
            <section class="settings-card">
                <div class="profile-picture-section">
                    <img src="image/user-icon.png" alt="user icon" class="profile-preview">
                    <div class="picture-controls">
                        <h3>Profile Picture</h3>
                        <p>PNG, JPEG.Max size of 1MB</p>
                        <div class="btn-group">
                        <button class="btn btn-main">Upload New</button>
                        <button class="btn btn-sub">Remove</button>
                    </div>
                </div>
            </div>

            <hr class="divider">
            
            <form class="profile-form">
                <div class="form-row">
                    <div class="form-group">
                        <label>First Name</label>
                        <input type="text" value="Lebron">
                    </div>

                    <div class="form-group">
                        <label>Last Name</label>
                        <input type="text" value="James">
                    </div>

                    <div class="form-group">
                        <label>Email Address (Gmail)</label>
                        <input type="email" value="lebron_james@gmail.com">
                    </div>

                    <div class="form-group">
                        <label>Phone Number</label>
                        <input type="text" value="012-3456-789">
                    </div>
                    <div class="form-group full width">
                        <div class="label-row">
                            <label>Bio</label>
                        </div>
                        <textarea rows="4"></textarea>
                    </div>

                    <div class="form-actions">
                        <button type="button" class="btn btn-sub">Cancel</button>
                        <button type="button" class="btn btn-main">Save Changes</button>
                    </div>
                </div>
            </form>
        </section>



    <script src="script.js"></script>
</body>
</html>
